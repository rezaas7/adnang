<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود ویژه عدنان</title>
    <style>
        :root {
            --bg1: #070812;
            --bg2: #11152a;
            --pink: #ff4da6;
            --blue: #56ccf2;
            --violet: #9b6dff;
            --gold: #ffd166;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.14);
            --text: #f5f7ff;
            --danger: #ff6b81;
            --success: #6ef3b0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, var(--bg2), var(--bg1));
            color: var(--text);
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* انیمیشن بک‌گراند */
        .bg-glow {
            position: absolute; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(255, 77, 166, 0.15), transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(86, 204, 242, 0.15), transparent 30%);
            z-index: 0;
        }

        .card {
            position: relative; z-index: 10;
            width: min(90%, 400px);
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-box {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, var(--pink), var(--violet));
            margin: 0 auto 20px;
            border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px;
            box-shadow: 0 10px 20px rgba(255, 77, 166, 0.3);
        }

        h1 { font-size: 24px; margin-bottom: 10px; color: var(--gold); }
        p { font-size: 14px; color: #aaa; margin-bottom: 30px; line-height: 1.6; }

        .input-group { position: relative; margin-bottom: 20px; }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.2);
            color: white;
            text-align: center;
            font-size: 18px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--blue); box-shadow: 0 0 15px rgba(86, 204, 242, 0.3); }

        .btn {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(90deg, var(--pink), var(--violet));
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover { transform: scale(1.02); filter: brightness(1.1); }
        .btn:active { transform: scale(0.98); }

        #error-msg {
            margin-top: 15px;
            color: var(--danger);
            font-size: 14px;
            font-weight: bold;
            display: none;
        }

        #loading {
            margin-top: 15px;
            color: var(--success);
            font-size: 14px;
            display: none;
        }

        /* افکت لرزش برای رمز اشتباه */
        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="card" id="login-card">
        <div class="icon-box">🔐</div>
        <h1>پنل دسترسی ویژه</h1>
        <p>لطفاً رمز عبور اختصاصی را وارد کنید تا محتوا برای شما باز شود.</p>

        <div class="input-group">
            <input type="password" id="password-input" placeholder="رمز عبور را بنویسید...">
        </div>

        <button class="btn" onclick="validatePassword()">ورود به سیستم</button>

        <div id="error-msg">عدنان جون اشتباهه</div>
        <div id="loading">تایید شد! در حال انتقال...</div>
    </div>

    <script>
        const inputField = document.getElementById('password-input');
        const errorLabel = document.getElementById('error-msg');
        const loadingLabel = document.getElementById('loading');
        const card = document.getElementById('login-card');
        const targetPage = "https://rezaas7.github.io/adnan/";

        async function validatePassword() {
            const userPass = inputField.value.trim();
            
            // مخفی کردن پیام‌های قبلی
            errorLabel.style.display = 'none';
            loadingLabel.style.display = 'none';

            try {
                // خواندن رمز از فایل 1.txt
                const response = await fetch('1.txt');
                
                if (!response.ok) {
                    throw new Error('فایل پیدا نشد');
                }

                const correctPass = (await response.text()).trim();

                if (userPass === correctPass) {
                    // رمز درست بود
                    loadingLabel.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = targetPage;
                    }, 1000);
                } else {
                    // رمز اشتباه بود
                    triggerError();
                }
            } catch (error) {
                console.error("خطا در سیستم:", error);
                errorLabel.textContent = "خطا در برقراری ارتباط با مخزن رمز!";
                triggerError();
            }
        }

        function triggerError() {
            errorLabel.style.display = 'block';
            card.classList.add('shake');
            setTimeout(() => {
                card.classList.remove('shake');
            }, 400);
        }

        // ورود با زدن کلید Enter
        inputField.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                validatePassword();
            }
        });
    </script>
</body>
</html>
